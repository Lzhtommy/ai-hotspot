name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  ci:
    name: Typecheck / Lint / Build / Migrate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Ephemeral Postgres with pgvector preinstalled — replaces the per-PR Neon
    # branch. Migrations (incl. `CREATE EXTENSION vector`) run against this
    # throwaway container, so PR CI needs no external DB credentials.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # Build-time env: schema introspection, etc. Runtime secrets are Vercel's problem.
          DATABASE_URL: ${{ secrets.DATABASE_URL_BUILD || 'postgres://build:build@localhost:5432/build' }}

      - name: Drizzle schema drift check
        run: pnpm db:check

      # --- Migrate against the ephemeral pgvector container on PRs (D-11, D-17) ---

      - name: Run Drizzle migrations on the CI Postgres container
        if: github.event_name == 'pull_request'
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ci_test

      # --- Migrate the production Supabase database on merge to main ---

      - name: Run Drizzle migrations on production (Supabase)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_MAIN }}

  trigger-deploy:
    name: Deploy Trigger.dev tasks
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Deploy to Trigger.dev (prod)
        run: pnpm trigger:deploy --env prod
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
          # trigger.config.ts reads process.env.TRIGGER_PROJECT_REF at bundle
          # time. Missing → resolves to the literal "undefined" and the CLI
          # reports "Project not found: undefined". The ref is public
          # (proj_xxx on the Trigger.dev dashboard) — vars is preferred over
          # secrets, but either works.
          TRIGGER_PROJECT_REF: ${{ vars.TRIGGER_PROJECT_REF || secrets.TRIGGER_PROJECT_REF }}
